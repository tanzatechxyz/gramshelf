{% extends "base.html" %}
{% block title %}Log in · GramShelf{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-card auth-card-compact">
    <div class="eyebrow">Private archive</div>
    <h1>Welcome back</h1>
    {% if error %}<div class="flash flash-error" role="alert">{{ error }}</div>{% endif %}
    <form action="{{ url_for('login_submit') }}" method="post" class="stacked-form">
      <input type="hidden" name="csrf" value="{{ csrf_token }}">
      <label>
        Administrator name
        <input type="text" name="username" autocomplete="username" required autofocus>
      </label>
      <label>
        Password
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button class="button button-primary" type="submit">Log in</button>
    </form>
  </div>
</section>
{% endblock %}
