name: Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify and build
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug
      - name: Stage APK
        run: cp app/build/outputs/apk/debug/app-debug.apk GramShelf-android-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: gramshelf-android-debug
          path: android/GramShelf-android-debug.apk
          if-no-files-found: error
